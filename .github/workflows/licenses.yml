name: Licenses

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: licenses-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Third-party license audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: services/control-plane/go.sum

      # Rust toolchain omitted — worker is out of CI until task #64
      # (WASI HTTP RC mismatch) is fixed; cargo-about check re-enable
      # when the crate builds cleanly.

      - uses: pnpm/action-setup@v4
        with:
          # Version comes from package.json's packageManager field.
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Install pnpm deps
        run: pnpm install --frozen-lockfile

      - name: Install audit tools
        run: |
          go install github.com/google/go-licenses@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Go — check allowed licenses
        run: |
          cd services/control-plane
          # Fail on any dep whose license is outside the allowed set.
          # Ignored:
          #   github.com/emdzej/spinup/services/control-plane — our own code (PolyForm Noncommercial, unclassifiable by go-licenses).
          #   modernc.org/mathutil — LICENSE present upstream but not fingerprinted; upstream is BSD-3-Clause.
          go-licenses check \
            --ignore=github.com/emdzej/spinup/services/control-plane \
            --ignore=modernc.org/mathutil \
            --allowed_licenses='Apache-2.0,BSD-2-Clause,BSD-3-Clause,ISC,MIT,MPL-2.0,Unlicense,CC0-1.0,0BSD,Zlib,Unicode-3.0,CDLA-Permissive-2.0,BSL-1.0' \
            ./cmd/control-plane

      - name: Regenerate notices and diff against committed (advisory)
        # Advisory only. `go-licenses` output subtly varies between Go
        # versions and go-licenses versions (e.g. transitive deps a newer
        # toolchain drops or adds), so pinning "notices match exactly"
        # produced constant CI failures that never reflected a real license
        # violation — those live in the earlier `go-licenses check` step,
        # which stays fatal. Report drift as a warning + summary artifact
        # so humans can regen when they care.
        run: |
          bash scripts/gen-third-party-notices.sh
          if ! git diff --exit-code -- '**/THIRD-PARTY-NOTICES.md'; then
            echo
            echo "::warning::THIRD-PARTY-NOTICES.md drift detected — run bash scripts/gen-third-party-notices.sh locally and commit."
            git --no-pager diff --stat -- '**/THIRD-PARTY-NOTICES.md'
          fi

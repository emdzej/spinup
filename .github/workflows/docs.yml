name: Docs → GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # VitePress lastUpdated uses git log
      - uses: pnpm/action-setup@v4
        with:
          # Version comes from package.json's packageManager field.
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm --filter spinup-docs build
      - name: Verify CNAME
        # docs/public/CNAME → dist/CNAME (VitePress copies public/ verbatim).
        # If missing, Pages will not stick the custom domain.
        run: test -f docs/.vitepress/dist/CNAME
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

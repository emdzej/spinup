# air (github.com/air-verse/air) config for hot-reloading the control-plane
# during local iteration against a real cluster (see scripts/dev-cluster.sh).
# Install: go install github.com/air-verse/air@latest
root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o tmp/spinup-control-plane ./cmd/control-plane"
  bin = "tmp/spinup-control-plane"
  include_ext = ["go"]
  # Avoid an infinite rebuild loop when the tmp/ binary itself changes and
  # picking up files that don't matter.
  exclude_dir = ["tmp", "internal/webui/dist"]
  exclude_regex = ["_test\\.go$"]
  delay = 200
  send_interrupt = true
  kill_delay = "2s"
  stop_on_error = true

[log]
  time = true

[misc]
  clean_on_exit = true

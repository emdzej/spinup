# cargo-about config for the spinup-worker crate. Any license outside `accepted`
# fails `cargo about generate` (and the licenses.yml CI job).

accepted = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "0BSD",
    "Unlicense",
    "CC0-1.0",
    "MPL-2.0",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
]

targets = [
    "aarch64-apple-darwin",
    "aarch64-unknown-linux-gnu",
    "x86_64-unknown-linux-gnu",
]

ignore-build-dependencies = false
ignore-dev-dependencies = true
ignore-transitive-dependencies = false

# Per-crate license overrides for crates whose SPDX expression includes a
# copyleft option we don't want (via "OR"). Pick the acceptable side here.

[ittapi]
accepted = ["BSD-3-Clause"]

[ittapi-sys]
accepted = ["BSD-3-Clause"]

[r-efi]
accepted = ["MIT"]

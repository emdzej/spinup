apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "spinup.controlPlane.name" . }}-spinapps
  namespace: {{ .Values.functionsNamespace.name }}
  labels:
    {{- include "spinup.labels" . | nindent 4 }}
rules:
  - apiGroups: ["core.spinkube.dev"]
    resources: ["spinapps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Read the SpinKube-generated Deployment to derive rollout state
  # (updatedReplicas / availableReplicas) — the SpinApp status alone can't
  # distinguish "old pod still Ready" from "new build actually live".
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  # Builder Jobs and their supporting Secrets (source + optional registry auth).
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # Function invoke proxy uses the Kubernetes services/proxy subresource
  # to reach the SpinApp Service from outside the pod network (no port-
  # forward required). Verb "get" is enough — proxy is a subresource GET.
  - apiGroups: [""]
    resources: ["services", "services/proxy"]
    verbs: ["get", "list"]
  # CronJob-based scheduled triggers (planned).
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Per-function Istio VirtualService emission. VSes bind to a Gateway in
  # another namespace (typically the release namespace) — that reference is
  # cross-namespace by name only and does not require RBAC on the Gateway.
  - apiGroups: ["networking.istio.io"]
    resources: ["virtualservices"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "spinup.controlPlane.name" . }}-spinapps
  namespace: {{ .Values.functionsNamespace.name }}
  labels:
    {{- include "spinup.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "spinup.controlPlane.name" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "spinup.controlPlane.name" . }}-spinapps

{{- if .Values.worker.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Chart.Name }}-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "spinup.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "spinup.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "spinup.name" . }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "spinup.labels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: {{ .Chart.Name }}-worker
      containers:
        - name: worker
          image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}"
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: SPINUP_WORKER_ADDR
              value: "0.0.0.0:8000"
            - name: SPINUP_CONTROL_PLANE_URL
              value: "http://{{ include "spinup.controlPlane.name" . }}.{{ .Release.Namespace }}.svc.cluster.local"
            {{- with .Values.worker.controlPlaneToken }}
            - name: SPINUP_CONTROL_PLANE_TOKEN
              value: {{ . | quote }}
            {{- end }}
            - name: SPINUP_CACHE_DIR
              value: /var/lib/spinup-worker
            - name: RUST_LOG
              value: info
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 30
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          volumeMounts:
            - name: cache
              mountPath: /var/lib/spinup-worker
      volumes:
        - name: cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "spinup.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "spinup.name" . }}
    app.kubernetes.io/component: worker
  ports:
    - name: http
      port: 80
      targetPort: http
{{- end }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "spinup.controlPlane.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "spinup.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controlPlane.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "spinup.name" . }}
      app.kubernetes.io/component: control-plane
  template:
    metadata:
      labels:
        {{- include "spinup.labels" . | nindent 8 }}
        app.kubernetes.io/component: control-plane
    spec:
      serviceAccountName: {{ include "spinup.controlPlane.name" . }}
      {{- with .Values.controlPlane.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # fsGroup lets the distroless-nonroot user (uid 65532) write to
      # RWO-mounted PVCs; without it the SQLite file open fails on Ceph RBD
      # and similar block-provisioner classes that mount root:root by default.
      securityContext:
        fsGroup: {{ .Values.controlPlane.podSecurityContext.fsGroup }}
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: control-plane
          image: "{{ .Values.controlPlane.image.repository }}:{{ .Values.controlPlane.image.tag }}"
          imagePullPolicy: {{ .Values.controlPlane.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SPINUP_HTTP_ADDR
              value: ":8080"
            - name: SPINUP_OIDC_ISSUER_URL
              value: {{ required "oidc.issuerUrl is required" .Values.oidc.issuerUrl | quote }}
            - name: SPINUP_OIDC_CLIENT_ID
              value: {{ required "oidc.clientId is required" .Values.oidc.clientId | quote }}
            {{- with .Values.oidc.audience }}
            - name: SPINUP_OIDC_AUDIENCE
              value: {{ . | quote }}
            {{- end }}
            - name: SPINUP_OIDC_REDIRECT_URL
              value: {{ default (printf "https://%s/auth/callback" .Values.dnsName) .Values.oidc.redirectUrl | quote }}
            {{- if .Values.oidc.clientSecret.existingSecret }}
            - name: SPINUP_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.oidc.clientSecret.existingSecret | quote }}
                  key: {{ .Values.oidc.clientSecret.secretKey | default "client-secret" | quote }}
            {{- else if .Values.oidc.clientSecret.value }}
            - name: SPINUP_OIDC_CLIENT_SECRET
              value: {{ .Values.oidc.clientSecret.value | quote }}
            {{- end }}
            {{- with .Values.authz.requiredRoles }}
            - name: SPINUP_AUTHZ_REQUIRED_ROLES
              value: {{ join "," . | quote }}
            {{- end }}
            {{- if .Values.worker.enabled }}
            - name: SPINUP_WORKER_URL
              value: "http://{{ .Chart.Name }}-worker.{{ .Release.Namespace }}.svc.cluster.local"
            {{- end }}
            - name: SPINUP_FUNCTIONS_NAMESPACE
              value: {{ .Values.functionsNamespace.name | quote }}
            {{- with .Values.functions.publicDomain }}
            - name: SPINUP_FUNCTIONS_PUBLIC_DOMAIN
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.functions.publicGateway }}
            - name: SPINUP_FUNCTIONS_PUBLIC_GATEWAY
              value: {{ . | quote }}
            {{- end }}
            {{- if .Values.functions.imagePullSecrets }}
            - name: SPINUP_FUNCTIONS_IMAGE_PULL_SECRETS
              value: "{{- range $i, $s := .Values.functions.imagePullSecrets }}{{ if $i }},{{ end }}{{ $s.name }}{{- end }}"
            {{- end }}
            - name: SPINUP_BUILDER_IMAGE_GO
              value: {{ .Values.builder.images.go | quote }}
            - name: SPINUP_BUILDER_IMAGE_JS
              value: {{ .Values.builder.images.js | quote }}
            - name: SPINUP_BUILDER_IMAGE_TS
              value: {{ .Values.builder.images.ts | quote }}
            - name: SPINUP_BUILDER_IMAGE_RUST
              value: {{ .Values.builder.images.rust | quote }}
            {{- if .Values.builder.imagePullSecrets }}
            - name: SPINUP_BUILDER_IMAGE_PULL_SECRETS
              value: "{{- range $i, $s := .Values.builder.imagePullSecrets }}{{ if $i }},{{ end }}{{ $s.name }}{{- end }}"
            {{- end }}
            - name: SPINUP_OCI_REGISTRY_URL
              value: {{ include "spinup.oci.registryUrl" . | quote }}
            {{- with include "spinup.oci.authSecretName" . }}
            - name: SPINUP_OCI_AUTH_SECRET
              value: {{ . | quote }}
            {{- end }}
            - name: SPINUP_DB_DRIVER
              value: {{ .Values.db.driver | quote }}
            {{- if eq .Values.db.driver "sqlite" }}
            - name: SPINUP_DB_DSN
              value: {{ .Values.db.sqlite.dsn | quote }}
            {{- else if eq .Values.db.driver "postgres" }}
            - name: SPINUP_DB_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ required "db.postgres.secretName is required" .Values.db.postgres.secretName }}
                  key: {{ .Values.db.postgres.secretKey }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 20
          resources:
            {{- toYaml .Values.controlPlane.resources | nindent 12 }}
          {{- if and (eq .Values.db.driver "sqlite") .Values.db.sqlite.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/spinup
          {{- end }}
      {{- if and (eq .Values.db.driver "sqlite") .Values.db.sqlite.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "spinup.controlPlane.name" . }}-data
      {{- end }}

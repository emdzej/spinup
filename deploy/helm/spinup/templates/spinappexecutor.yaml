{{- if .Values.spinAppExecutor.create }}
apiVersion: core.spinkube.dev/v1alpha1
kind: SpinAppExecutor
metadata:
  name: {{ .Values.spinAppExecutor.name }}
  namespace: {{ .Values.functionsNamespace.name }}
  labels:
    {{- include "spinup.labels" . | nindent 4 }}
spec:
  createDeployment: true
  deploymentConfig:
    runtimeClassName: {{ .Values.spinAppExecutor.runtimeClassName }}
    installDefaultCACerts: {{ .Values.spinAppExecutor.installDefaultCACerts }}
    {{- /*
       Resolve the shim's OTLP endpoint:
        1. observability.otelExporterUrl wins if set (point at a platform
           collector like Vector or a hosted service).
        2. Else, if the bundled collector is enabled, use its in-namespace Service.
        3. Else, no OTel block at all — the shim skips OTLP export.
       OTLP/HTTP (4318) is intentional: the shim's gRPC exporter defaults to
       TLS and doesn't downgrade to h2c, so gRPC silently fails on insecure
       collectors.
    */}}
    {{- $otelUrl := .Values.observability.otelExporterUrl -}}
    {{- if and (not $otelUrl) .Values.observability.otelCollector.enabled -}}
      {{- $otelUrl = printf "http://%s-otel-collector.%s.svc.cluster.local:4318" .Chart.Name .Release.Namespace -}}
    {{- end }}
    {{- if $otelUrl }}
    otel:
      exporter_otlp_endpoint: {{ $otelUrl | quote }}
    {{- end }}
{{- end }}
